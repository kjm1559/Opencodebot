version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocknews_postgres
    environment:
      POSTGRES_USER: stocknews
      POSTGRES_PASSWORD: stocknews
      POSTGRES_DB: stocknews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocknews"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stocknews_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: stocknews_celery_worker
    command: celery -A app.celery worker -l info --loglevel=info
    environment:
      - DATABASE_URL=postgresql://stocknews:stocknews@postgres:5432/stocknews
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build: .
    container_name: stocknews_celery_beat
    command: celery -A app.celery beat -l info
    environment:
      - DATABASE_URL=postgresql://stocknews:stocknews@postgres:5432/stocknews
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: stocknews_network
